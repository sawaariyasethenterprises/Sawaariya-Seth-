<?xml version="1.0" encoding="UTF-8"?>
<!-- Sawaariya Seth Enterprises — Primary Logo (Light Background / Print) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" fill="none">
  <defs>
    <linearGradient id="emblemGrad" x1="0" y1="0" x2="130" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#FF6B00" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════
       EMBLEM (130 × 130)
  ════════════════════════════════ -->

  <!-- Outer glow -->
  <rect x="4" y="4" width="122" height="122" rx="29" fill="url(#emblemGrad)" opacity="0.15"/>

  <!-- Main emblem body -->
  <rect x="0" y="0" width="130" height="130" rx="28" fill="url(#emblemGrad)" filter="url(#softShadow)"/>

  <!-- Shine overlay (top-left quadrant) -->
  <rect x="0" y="0" width="130" height="130" rx="28" fill="url(#shineGrad)" opacity="0.35"/>

  <!-- Inner border ring -->
  <rect x="7" y="7" width="116" height="116" rx="22" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none"/>

  <!-- ── BAG ICON ── -->
  <!-- Single arch handle — elegant loop bag silhouette -->
  <path d="M34 66 Q34 20 65 20 Q96 20 96 66"
        stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Bag body — rounded rect -->
  <rect x="24" y="66" width="82" height="50" rx="10"
        fill="rgba(255,255,255,0.16)" stroke="white" stroke-width="4.5"/>

  <!-- Decorative center-fold line on bag (like a real folded bag) -->
  <line x1="38" y1="92" x2="92" y2="92"
        stroke="rgba(255,255,255,0.38)" stroke-width="1.8" stroke-dasharray="6 4.5"/>

  <!-- "SSE" monogram inside bag body -->
  <text x="65" y="88"
    text-anchor="middle" dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13" font-weight="bold"
    fill="rgba(255,255,255,0.5)" letter-spacing="3.5">SSE</text>

  <!-- ── ECO QUALITY MARK (top-right) ── -->
  <circle cx="105" cy="22" r="11" fill="rgba(255,255,255,0.14)" stroke="white" stroke-width="1.8"/>
  <!-- Leaf inside circle -->
  <path d="M100 23 Q105 15 110 23" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M105 23 L105 28"        stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════
       WORDMARK  (starts at x = 152)
  ════════════════════════════════════════ -->

  <!-- Brand name — SAWAARIYA SETH -->
  <text x="152" y="52"
    font-family="Cinzel, 'Palatino Linotype', Georgia, serif"
    font-size="38" font-weight="700"
    fill="#0D1730" letter-spacing="2.5">
    SAWAARIYA SETH
  </text>

  <!-- Divider rule -->
  <rect x="152" y="64" width="400" height="1.5" rx="0.75" fill="#FF6B00" opacity="0.45"/>

  <!-- ENTERPRISES -->
  <text x="152" y="89"
    font-family="Cinzel, 'Palatino Linotype', Georgia, serif"
    font-size="21" font-weight="400"
    fill="#FF6B00" letter-spacing="13">
    ENTERPRISES
  </text>

  <!-- Tagline -->
  <text x="153" y="114"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13.5"
    fill="rgba(0,0,0,0.32)" letter-spacing="2.8"
    font-style="italic">
    Premium Non Woven Bags · Proudly Indian
  </text>
</svg>
